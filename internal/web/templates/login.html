<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · Open ProPanel</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="h-full bg-zinc-50 text-zinc-900 antialiased">
<div class="flex min-h-full items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="mb-8 flex flex-col items-center gap-3">
      <div class="grid h-11 w-11 place-items-center rounded-xl bg-blue-600 text-white">
        <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h10M4 18h7"/></svg>
      </div>
      <h1 class="text-2xl font-semibold tracking-tight text-zinc-900">Open <span class="text-blue-600">ProPanel</span></h1>
      <p class="text-sm text-zinc-500">Sign in to manage your server</p>
    </div>

    <div class="opp-card p-6">
      {{if .Error}}
      <div class="mb-4 rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">{{.Error}}</div>
      {{end}}
      <form method="post" action="/login" class="space-y-4">
        <div>
          <label class="mb-1.5 block text-sm font-medium text-zinc-700" for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required autofocus class="opp-input">
        </div>
        <div>
          <label class="mb-1.5 block text-sm font-medium text-zinc-700" for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required class="opp-input">
        </div>
        <button type="submit" class="flex w-full items-center justify-center rounded-lg bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-blue-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500/40">
          Sign in
        </button>
      </form>
    </div>
    <p class="mt-6 text-center text-xs text-zinc-400">Open ProPanel · open-source server control panel</p>
  </div>
</div>
</body>
</html>
