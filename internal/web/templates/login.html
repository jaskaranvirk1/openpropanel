<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · Open ProPanel</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="h-full bg-slate-950 text-slate-200 antialiased">
<div class="relative flex min-h-full items-center justify-center overflow-hidden px-4">
  <!-- ambient glow -->
  <div class="pointer-events-none absolute -top-40 left-1/2 h-96 w-96 -translate-x-1/2 rounded-full bg-indigo-600/20 blur-3xl"></div>

  <div class="relative w-full max-w-sm">
    <div class="mb-8 flex flex-col items-center gap-3">
      <div class="grid h-12 w-12 place-items-center rounded-xl bg-gradient-to-br from-indigo-500 to-violet-600 text-white shadow-lg shadow-indigo-500/30">
        <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h10M4 18h7"/></svg>
      </div>
      <h1 class="text-xl font-semibold tracking-tight text-white">Open <span class="text-indigo-400">ProPanel</span></h1>
      <p class="text-sm text-slate-400">Sign in to manage your server</p>
    </div>

    <div class="rounded-2xl border border-white/5 bg-slate-900/60 p-6 shadow-2xl backdrop-blur">
      {{if .Error}}
      <div class="mb-4 rounded-lg border border-rose-500/20 bg-rose-500/10 px-3 py-2 text-sm text-rose-300">{{.Error}}</div>
      {{end}}
      <form method="post" action="/login" class="space-y-4">
        <div>
          <label class="mb-1.5 block text-sm font-medium text-slate-300" for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required autofocus
                 class="block w-full rounded-lg border border-white/10 bg-slate-950/60 px-3 py-2 text-sm text-slate-100 placeholder-slate-500 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30 focus:outline-none">
        </div>
        <div>
          <label class="mb-1.5 block text-sm font-medium text-slate-300" for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required
                 class="block w-full rounded-lg border border-white/10 bg-slate-950/60 px-3 py-2 text-sm text-slate-100 placeholder-slate-500 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30 focus:outline-none">
        </div>
        <button type="submit"
                class="flex w-full items-center justify-center rounded-lg bg-indigo-500 px-4 py-2.5 text-sm font-semibold text-white shadow-lg shadow-indigo-500/20 hover:bg-indigo-400 focus:ring-2 focus:ring-indigo-500/40 focus:outline-none transition-colors">
          Sign in
        </button>
      </form>
    </div>
    <p class="mt-6 text-center text-xs text-slate-600">Open ProPanel · open-source server control panel</p>
  </div>
</div>
</body>
</html>
