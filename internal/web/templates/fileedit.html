{{define "title"}}Edit · Open ProPanel{{end}}

{{define "content"}}
<div class="mb-4 flex flex-wrap items-center justify-between gap-3">
  <div class="min-w-0">
    <h1 class="truncate text-lg font-semibold text-white">{{.Data.Name}}</h1>
    <p class="truncate font-mono text-xs text-slate-500">{{.Data.Site.Domain}} · /{{.Data.Path}}</p>
  </div>
  <a href="/files?site={{.Data.Site.ID}}&path={{.Data.Dir}}" class="text-sm text-slate-400 hover:text-slate-200">&larr; Back to files</a>
</div>

<form method="post" action="/files/save" class="rounded-2xl border border-white/5 bg-slate-900/40 p-4">
  <input type="hidden" name="site" value="{{.Data.Site.ID}}">
  <input type="hidden" name="path" value="{{.Data.Path}}">
  <textarea name="content" spellcheck="false"
            class="block h-[62vh] w-full resize-y rounded-lg border border-white/10 bg-slate-950/70 p-4 font-mono text-sm leading-relaxed text-slate-100 focus:border-indigo-500 focus:outline-none">{{.Data.Content}}</textarea>
  <div class="mt-4 flex items-center gap-2">
    <button type="submit" class="rounded-lg bg-indigo-500 px-4 py-2 text-sm font-semibold text-white shadow-lg shadow-indigo-500/20 hover:bg-indigo-400 transition-colors">Save</button>
    <a href="/files?site={{.Data.Site.ID}}&path={{.Data.Dir}}" class="rounded-lg border border-white/10 px-4 py-2 text-sm text-slate-300 hover:bg-white/5">Cancel</a>
  </div>
</form>
{{end}}
