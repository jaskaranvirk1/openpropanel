<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Set up your account · Open ProPanel</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="h-full bg-zinc-50 text-zinc-900 antialiased">
<div class="flex min-h-full items-center justify-center px-4 py-10">
  <div class="w-full max-w-sm">
    <div class="mb-8 flex flex-col items-center gap-3">
      <div class="grid h-11 w-11 place-items-center rounded-xl bg-blue-600 text-white">
        <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h10M4 18h7"/></svg>
      </div>
      <h1 class="text-2xl font-semibold tracking-tight text-zinc-900">Welcome to Open <span class="text-blue-600">ProPanel</span></h1>
      <p class="text-center text-sm text-zinc-500">Create your admin account to finish setup.<br>This replaces the temporary install password.</p>
    </div>

    <div class="opp-card p-6">
      {{if .Error}}
      <div class="mb-4 rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">{{.Error}}</div>
      {{end}}
      <form method="post" action="/setup" class="space-y-4">
        <div>
          <label class="mb-1.5 block text-sm font-medium text-zinc-700" for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required autofocus
                 value="{{with .User}}{{.Username}}{{end}}" pattern="[a-z0-9][a-z0-9_-]{2,31}" class="opp-input">
          <p class="mt-1 text-xs text-zinc-400">3–32 chars: lowercase letters, digits, <span class="font-mono">_</span> or <span class="font-mono">-</span>.</p>
        </div>
        <div>
          <label class="mb-1.5 block text-sm font-medium text-zinc-700" for="password">New password</label>
          <input id="password" name="password" type="password" autocomplete="new-password" required minlength="8" class="opp-input">
        </div>
        <div>
          <label class="mb-1.5 block text-sm font-medium text-zinc-700" for="confirm">Confirm password</label>
          <input id="confirm" name="confirm" type="password" autocomplete="new-password" required minlength="8" class="opp-input">
        </div>
        <button type="submit" class="flex w-full items-center justify-center rounded-lg bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-blue-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500/40">
          Create account &amp; continue
        </button>
      </form>
    </div>
    <p class="mt-6 text-center text-xs text-zinc-400">You can add more accounts later under Users.</p>
  </div>
</div>
</body>
</html>
