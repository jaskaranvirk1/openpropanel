name: release

# Tag a version to cut a release:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # needed to create the GitHub release

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Build the Tailwind CSS that gets embedded into the binary.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build Tailwind CSS
        run: npx --yes tailwindcss@3 -i css/input.css -o internal/web/static/app.css --minify

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
