# GoReleaser builds Open ProPanel's release artifacts: static linux binaries
# (amd64 + arm64), .tar.gz archives, an .rpm, and checksums — then publishes
# them to a GitHub release. The binary is CGO-free with the whole UI embedded
# (the committed internal/web/static/app.css), so no build tools are needed at
# release time and the git tree stays clean.
#
#   Release:  git tag v0.1.0 && git push origin v0.1.0   (CI runs this)
version: 2

project_name: openpropanel

builds:
  - id: openpropanel
    main: ./cmd/openpropanel
    binary: openpropanel
    env:
      - CGO_ENABLED=0
    goos: [linux]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: openpropanel
    formats: [tar.gz]
    # Version-less names so scripts/get.sh can fetch
    # /releases/latest/download/openpropanel_linux_<arch>.tar.gz reliably.
    name_template: "openpropanel_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - packaging/openpropanel.service
      - scripts/get.sh

nfpms:
  - id: openpropanel
    package_name: openpropanel
    formats: [rpm]
    maintainer: "jaskaranvirk1 <jaskaran.virk1@gmail.com>"
    description: "Open ProPanel - open-source server control panel (cPanel alternative)"
    license: MIT
    homepage: "https://github.com/jaskaranvirk1/openpropanel"
    bindir: /usr/local/bin
    dependencies: [httpd, mod_ssl, php-fpm, certbot, git, openssh-clients]
    contents:
      - src: packaging/openpropanel.service
        dst: /etc/systemd/system/openpropanel.service
    scripts:
      postinstall: packaging/postinstall.sh

checksum:
  name_template: "checksums.txt"

# No release.github block: GoReleaser auto-detects the repository from the CI
# environment, so this publishes to whatever repo the workflow runs in.
release:
  header: |
    ## Open ProPanel {{ .Tag }}

    One-command install on AlmaLinux / RHEL:
    ```
    curl -fsSL https://raw.githubusercontent.com/jaskaranvirk1/openpropanel/main/scripts/get.sh | sudo bash
    ```
